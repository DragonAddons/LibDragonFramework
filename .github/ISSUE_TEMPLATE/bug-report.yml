name: Bug Report
description: Report a bug in LibDragonFramework
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Create a widget with ...
        2. Call ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: ldf-version
    attributes:
      label: LibDragonFramework Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: dropdown
    id: wow-version
    attributes:
      label: WoW Client Version
      options:
        - Retail
        - Cata Classic
        - MoP Classic
        - TBC Anniversary
        - Classic Era
      multiple: true
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
    validations:
      required: false
